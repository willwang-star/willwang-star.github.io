<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Single-page-app redirect for GitHub Pages.
      // Stashes the path + search in sessionStorage, then loads index.html,
      // where main.tsx will pick it up and replace the URL.
      (function () {
        var basePath = "/devportal/";
        var l = window.location;
        var path = l.pathname;
        // Don't redirect actual asset 404s (e.g. /assets/missing.css) or HTML files.
        if (/\.[a-z0-9]+$/i.test(path)) {
          document.title = "Not found";
          document.body.innerHTML = "<p style='font-family:system-ui;padding:2rem;'>Not found</p>";
          return;
        }
        sessionStorage.setItem(
          "spa-redirect",
          path.slice(basePath.length - 1) + l.search + l.hash,
        );
        l.replace(basePath);
      })();
    </script>
  </head>
  <body></body>
</html>
