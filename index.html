<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Portal — Previews</title>
<style>
  :root {
    --bg: #0b0d10;
    --surface: #15181d;
    --border: #2a2f37;
    --text: #e6e8eb;
    --muted: #9aa3ad;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .container { max-width: 720px; width: 100%; }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin: 0 0 32px;
  }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    margin-bottom: 12px;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  li:hover { border-color: var(--accent); transform: translateY(-1px); }
  a {
    display: block;
    padding: 18px 20px;
    color: var(--text);
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
  }
  a::after {
    content: "→";
    float: right;
    color: var(--muted);
    transition: transform 0.15s ease, color 0.15s ease;
  }
  li:hover a::after { color: var(--accent); transform: translateX(2px); }
</style>
</head>
<body>
  <div class="container">
    <h1>Dev Portal — Previews</h1>
    <p class="subtitle">HTML previews hosted via GitHub Pages.</p>
    <ul>
      <li><a href="AIW%20Onboarding.html">AIW Onboarding</a></li>
      <li><a href="DDE%20Onboarding.html">DDE Onboarding</a></li>
      <li><a href="Dev%20Portal%20Onboarding.html">Dev Portal Onboarding</a></li>
      <li><a href="DevPortal%20User%20Research.html">DevPortal User Research</a></li>
      <li><a href="DevPortal%20Workshop%20Brief.html">DevPortal Workshop Brief</a></li>
    </ul>
  </div>
</body>
</html>
